input {
  # Leer archivos de log del backend
  file {
    path => "/var/log/backend/*.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
  }
}

filter {
  # Renombrar timestamp original para no perderlo
  mutate {
    rename => { "timestamp" => "log_timestamp" }
  }
  
  # Establecer @timestamp como la fecha del log
  date {
    match => [ "log_timestamp", "ISO8601" ]
    target => "@timestamp"
  }
  
  # Añadir campo para identificar el servicio
  mutate {
    add_field => { "service" => "fisiored-backend" }
  }
  
  # Eliminar campos innecesarios
  mutate {
    remove_field => ["log_timestamp", "ecs", "agent", "host"]
  }
}

output {
  # Enviar a Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "fisiored-backend-logs-%{+YYYY.MM.dd}"
  }
  
  # También mostrar en consola para debug
  stdout { 
    codec => rubydebug 
  }
}